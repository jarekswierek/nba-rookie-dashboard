# Alembic configuration file.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory.
script_location = alembic

# Template used to generate new migration file names.
# Default: %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone used when generating migration file timestamps.
timezone = UTC

# sys.path extension — allows importing backend.* without installing the package.
prepend_sys_path = .

# Version path separator — used on Windows.
version_path_separator = os

# SQLAlchemy URL is set dynamically in env.py via Settings, not here.
# Leaving sqlalchemy.url empty prevents accidental hardcoded connections.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
